# Local dev override — docker compose automatically merges this file.
# Adds nginx reverse proxy at port 9999 so the frontend uses relative URLs.
# Access the app at http://localhost:9999
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:80"
    volumes:
      - ./deploy/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
