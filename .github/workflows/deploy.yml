name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          PUBLIC_API_URL: http://173.212.245.66:8888

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build/

      - name: Deploy backend & start services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /opt/cashflow-ai/backend
            mkdir -p /opt/cashflow-ui

      - name: Sync backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "backend/*,docker-compose.yml"
          target: /opt/cashflow-ai
          overwrite: true

      - name: Deploy frontend static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "frontend-build/*"
          target: /opt/cashflow-ui
          strip_components: 1
          overwrite: true

      - name: Deploy nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/nginx-cashflow.conf"
          target: /etc/nginx/sites-available/
          strip_components: 1
          overwrite: true

      - name: Start services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/cashflow-ai

            # Create .env if missing
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "Created .env — update with real API keys"
            fi

            # Inject secrets into .env
            if [ -n "${{ secrets.JWT_SECRET }}" ]; then
              sed -i "s|JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" backend/.env
            fi
            if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
              sed -i "s|ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" backend/.env
            fi

            # Build and start
            docker compose up -d --build

            # Configure nginx
            ln -sf /etc/nginx/sites-available/nginx-cashflow.conf /etc/nginx/sites-enabled/cashflow-ai
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "Deploy complete"
            docker compose ps
