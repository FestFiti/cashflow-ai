name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e

            # Pull latest code
            mkdir -p /opt/cashflow-ai
            cd /opt/cashflow-ai
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/FestFifi/cashflow-ai.git
            fi
            git fetch origin main
            git reset --hard origin/main

            cd /opt/cashflow-ai

            # Create .env if missing
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
            fi

            # Inject secrets
            sed -i "s|JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" backend/.env
            sed -i "s|OPENROUTER_API_KEY=.*|OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}|" backend/.env
            sed -i "s|MPESA_CONSUMER_KEY=.*|MPESA_CONSUMER_KEY=${{ secrets.MPESA_CONSUMER_KEY }}|" backend/.env
            sed -i "s|MPESA_CONSUMER_SECRET=.*|MPESA_CONSUMER_SECRET=${{ secrets.MPESA_CONSUMER_SECRET }}|" backend/.env
            sed -i "s|MPESA_PASSKEY=.*|MPESA_PASSKEY=${{ secrets.MPESA_PASSKEY }}|" backend/.env
            sed -i "s|MPESA_CALLBACK_URL=.*|MPESA_CALLBACK_URL=https://flowai.cash/webhooks/c2b|" backend/.env
            sed -i "s|RATIBA_WEBHOOK_URL=.*|RATIBA_WEBHOOK_URL=https://flowai.cash/webhooks/ratiba|" backend/.env
            sed -i "s|CORS_ORIGINS=.*|CORS_ORIGINS=https://flowai.cash,https://www.flowai.cash|" backend/.env

            # Build and start
            docker compose down --remove-orphans || true
            docker compose up -d --build

            # Update nginx config
            cp deploy/nginx-cashflow.conf /etc/nginx/sites-available/nginx-cashflow.conf
            ln -sf /etc/nginx/sites-available/nginx-cashflow.conf /etc/nginx/sites-enabled/cashflow-ai
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "Deploy complete"
            docker compose ps
