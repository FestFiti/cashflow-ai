server {
    listen 80;
    server_name flowai.cash www.flowai.cash;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flowai.cash www.flowai.cash;

    ssl_certificate /etc/letsencrypt/live/flowai.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowai.cash/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Backend API routes
    location ~ ^/(auth|invoices|payments|webhooks|reminders|ai|dashboard|notifications|team|health|docs|openapi\.json|redoc)(/|$) {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Frontend — SvelteKit Node server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
